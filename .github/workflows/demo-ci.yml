name: Culture demo checks

on:
  push:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"
  pull_request:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Set up Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache wasm-pack
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.14.0

      - name: Install wasm-pack
        run: command -v wasm-pack >/dev/null 2>&1 || cargo install wasm-pack --version 0.14.0 --locked

      - name: Install dependencies
        run: npm ci

      - name: Run tests and production build
        run: npm run check

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: demo/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
